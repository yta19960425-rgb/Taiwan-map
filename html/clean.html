<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>淨島碎片 - 拾荒紀錄</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/clean.css">
</head>
<body class="fullscreen-bg">
<nav class="navbar">
    <div class="nav-logo">徒步日記</div>
    <ul class="nav-links">
        <li><a href="index.html">嘿～</a></li>
        <li><a href="map.html">足跡</a></li>
        <li><a href="diary.html">日記</a></li>
        <li><a href="clean.html" class="active">淨島</a></li>
        <li><a href="blog.html">發現</a></li>
        <li><a href="discovery.html">探索</a></li> 
        <li><a href="about.html">介紹</a></li>
    </ul>
</nav>

<div class="container">
    <h1 class="clean-title">淨島中</h1>
    <div class="dashboard-wrapper">
        <div class="stats-side">
            <div class="stat-box-mini">
                <span class="stat-label">總重量</span>
                <div class="stat-value"><span id="weight-count">0</span><small>g</small></div>
            </div>
            <div class="stat-box-mini">
                <span class="stat-label">累積天數</span>
                <div class="stat-value" id="day-count">0</div>
            </div>
        </div>
        <div class="chart-main">
            <div class="canvas-container"><canvas id="trendChart"></canvas></div>
        </div>
    </div>

    <div class="clean-slogan">
        <p class="slogan-main">我知道，拾起一片垃圾、減少一個塑膠袋都不會改變世界</p>
        <p class="slogan-sub">但我知道，每一個選擇，都是我願意為這個世界付出的多一點點美好</p>
    </div>

    <div class="log-section">
        <div class="log-header"><h2>拾荒紀錄日誌</h2></div>
        <div id="cleanup-log"></div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <img id="modal-img" src="">
        <div class="modal-info">
            <h3 id="modal-location"></h3>
            <p id="modal-date" style="color:#888; font-size:0.9rem;"></p>
            <div id="modal-tags"></div>
            <p id="modal-desc" style="margin-top:15px; line-height:1.6;"></p>
        </div>
    </div>
</div>
<script src="../js/clean.js"></script>
</body>
</html>
