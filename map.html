<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>徒步發現 - 台灣在地探索</title>
    <link rel="stylesheet" href="navbar.css">
    <style>
        :root {
            --primary-green: #6f9c76;
            --bg-gray: #f8f9fa;
            --text-dark: #333;
        }

        body {
            background-color: var(--bg-gray);
            margin: 0;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        /* 標題與分類區 */
        .header-section {
            text-align: center;
            padding: 40px 20px;
            background: white;
        }
        .header-section h1 {
            letter-spacing: 5px;
            color: var(--text-dark);
            margin-bottom: 25px;
        }

        .filter-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 10px 25px;
            border: 2px solid var(--primary-green);
            background: transparent;
            color: var(--primary-green);
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: var(--primary-green);
            color: white;
        }

        /* 卡片容器 */
        .discovery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto 50px;
            padding: 20px;
        }

        /* 拍立得卡片樣式 */
        .polaroid-card {
            background: white;
            padding: 15px 15px 40px 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .polaroid-card:hover {
            transform: translateY(-10px) rotate(2deg);
        }

        .card-img {
            width: 100%;
            height: 200px;
            background-color: #eee;
            background-size: cover;
            background-position: center;
            margin-bottom: 15px;
        }

        .card-caption {
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--text-dark);
        }

        /* 詳細資訊疊層 */
        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(111, 156, 118, 0.95);
            color: white;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            text-align: center;
        }

        .polaroid-card:hover .card-overlay {
            opacity: 1;
        }

        .overlay-title {
            font-size: 1.1rem;
            margin-bottom: 10px;
            border-bottom: 1px solid white;
            padding-bottom: 5px;
        }

        .overlay-text {
            font-size: 0.95rem;
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            .discovery-grid {
                grid-template-columns: 1fr;
                padding: 15px;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-logo">徒步日記</div>
    <ul class="nav-links">
        <li><a href="index.html">進度地圖</a></li>
        <li><a href="walking2.html">徒步日記</a></li>
        <li><a href="clean.html">淨島</a></li>
        <li><a href="map.html">在地探索</a></li> 
        <li><a href="about.html">個人介紹</a></li>
    </ul>
</nav>

<div class="header-section">
    <h1>在地探索</h1>
    <div class="filter-group">
        <button class="filter-btn active" onclick="filterData('food', this)">🌮 找美食</button>
        <button class="filter-btn" onclick="filterData('spots', this)">📸 逛景點</button>
        <button class="filter-btn" onclick="filterData('features', this)">✨ 看特色</button>
    </div>
    <p id="current-label">目前正在探索：在地美食</p>
</div>



<div class="discovery-grid" id="main-grid">
    </div>

<script>
    // 1. 建立各縣市資料庫
    const counties = [
        { id: "Taipei", name: "台北市", food: "牛肉麵、小籠包", spots: "台北101、象山夜景", features: "繁華且快速的城市節奏", img: "https://images.unsplash.com/photo-1584467541268-b040f83be3fd?q=80&w=400" },
        { id: "Taichung", name: "台中市", food: "太陽餅、麻辣火鍋", spots: "歌劇院、高美濕地", features: "寬廣的大道與藝術氣息", img: "https://images.unsplash.com/photo-1590710668615-586196a60029?q=80&w=400" },
        { id: "Changhua", name: "彰化縣", food: "肉圓、爌肉飯", spots: "八卦山大佛、扇形車庫", features: "濃厚的傳統與古樸人情", img: "https://images.unsplash.com/photo-1610450846660-f92592f7f98d?q=80&w=400" },
        { id: "Tainan", name: "台南市", food: "牛肉湯、鱔魚意麵", spots: "安平古堡、神農街", features: "隨處可見的古蹟與甜味回憶", img: "https://images.unsplash.com/photo-1596401057633-5310517f4d4d?q=80&w=400" },
        { id: "Kaohsiung", name: "高雄市", food: "旗津海鮮、羊肉爐", spots: "駁二、西子灣夕陽", features: "港都的熱情與寬闊港灣", img: "https://images.unsplash.com/photo-1571408660341-28e4618e404b?q=80&w=400" },
        { id: "Hualien", name: "花蓮縣", food: "公正包子、麻糬", spots: "太魯閣、七星潭", features: "大自然的山海震撼", img: "https://images.unsplash.com/photo-1620853509204-58950d992144?q=80&w=400" }
    ];

    let currentType = 'food';

    // 2. 渲染卡片函式
    function renderCards() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';

        counties.forEach(county => {
            const card = document.createElement('div');
            card.className = 'polaroid-card';
            
            const labels = { food: '在地美食', spots: '熱門景點', features: '縣市特色' };
            
            card.innerHTML = `
                <div class="card-img" style="background-image: url('${county.img}')"></div>
                <div class="card-caption">${county.name}</div>
                <div class="card-overlay">
                    <div class="overlay-title">${labels[currentType]}</div>
                    <div class="overlay-text">${county[currentType]}</div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // 3. 分類切換函式
    function filterData(type, btn) {
        currentType = type;
        
        // 更新按鈕樣式
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // 更新文字標籤
        const labels = { food: '在地美食', spots: '熱門景點', features: '縣市特色' };
        document.getElementById('current-label').innerText = `目前正在探索：${labels[type]}`;

        renderCards();
    }

    // 初始執行
    renderCards();
</script>

</body>
</html>
